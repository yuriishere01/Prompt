<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptForge | Professional AI Prompt Enhancer</title>
    <meta name="description" content="Elevate your AI prompts with professional personas and structured details using PromptForge.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <main class="container">
        <nav class="top-nav glass-panel">
            <div class="nav-logo">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span>PromptForge</span>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="active">Home</a></li>
                <li class="dropdown">
                    <a href="#">Details <i class="fa-solid fa-angle-down" style="font-size: 0.8em; margin-left: 2px;"></i></a>
                    <div class="dropdown-content glass-panel">
                        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Contact Support</p>
                        <a href="mailto:glitchedotaku@gmail.com"><i class="fa-regular fa-envelope"></i> glitchedotaku@gmail.com</a>
                    </div>
                </li>
                <li><a href="#">Pro</a></li>
            </ul>
        </nav>

        <header>
            <div class="logo">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <h1>PromptForge</h1>
            </div>
            <p class="subtitle">Elevate your prompts to professional grade</p>
        </header>


        <section class="builder-section glass-panel">
            <div class="input-group">
                <label for="promptType">
                    <i class="fa-solid fa-layer-group"></i> What are you building?
                </label>
                <select id="promptType" class="modern-select">
                    <option value="website">Website / Web App</option>
                    <option value="image">Image / Art Generation</option>
                    <option value="video">Video / Animation</option>
                    <option value="software">Software Engineering</option>
                    <option value="marketing">Marketing / Copywriting</option>
                </select>
            </div>

            <div class="input-group">
                <label for="originalPrompt">
                    <i class="fa-regular fa-comment-dots"></i> Your Basic Prompt
                </label>
                <textarea id="originalPrompt" placeholder="E.g., I want a website for my coffee shop..."></textarea>
            </div>

            <button id="enhanceBtn" class="primary-btn">
                <span class="btn-text">Enhance Prompt</span>
                <i class="fa-solid fa-bolt btn-icon"></i>
                <div class="loader hidden"></div>
            </button>
        </section>

        <section id="resultSection" class="result-section glass-panel hidden">
            <div class="result-header">
                <h2><i class="fa-solid fa-check-double"></i> Enhanced Prompt</h2>
                <button id="copyBtn" class="icon-btn" title="Copy to Clipboard">
                    <i class="fa-regular fa-copy"></i>
                </button>
            </div>
            <div id="enhancedPromptOutput" class="output-content"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
